---
layout: default
---

<a class="back-link" href="{{ "/" | relative_url }}">{{ site.theme_config.back_home_text | default: ".." }}</a>

<article>
  <h1>{{ page.title }}</h1>
  <p class="post-date-header"><time datetime="{{ page.date }}">{{ page.date | date: site.theme_config.date_format }}</time></p>

  {{ content }}
</article>
